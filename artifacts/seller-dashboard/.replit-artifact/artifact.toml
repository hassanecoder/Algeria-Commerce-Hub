kind = "web"
previewPath = "/"
title = "Algerian Seller Dashboard"
version = "1.0.0"
id = "artifacts/seller-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26141

[services.development]
run = "pnpm --filter @workspace/seller-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/seller-dashboard", "run", "build" ]
publicDir = "artifacts/seller-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26141"
BASE_PATH = "/"
